<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Activities Calendar</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --border-light: #f3f4f6;
      --today-bg: #eff6ff;
      --today-border: #3b82f6;
      --hover: #f9fafb;
      --event: #eab308;
      --event-bg: #fefce8;
      --event-border: #facc15;
      --campaign: #a855f7;
      --campaign-bg: #faf5ff;
      --campaign-border: #c084fc;
      --asset: #92400e;
      --asset-bg: #fef3c7;
      --asset-border: #d97706;
      --project: #ea580c;
      --project-bg: #fff7ed;
      --project-border: #fb923c;
      --pr-comms: #ec4899;
      --pr-comms-bg: #fdf2f8;
      --pr-comms-border: #f472b6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .app { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .month-nav { display: flex; align-items: center; gap: 8px; }
    .month-nav button {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 12px; cursor: pointer; font-size: 13px; color: var(--text); transition: background 0.15s;
    }
    .month-nav button:hover { background: var(--hover); }
    .month-label { font-size: 16px; font-weight: 600; min-width: 180px; text-align: center; }
    .today-btn { background: #3b82f6 !important; color: white !important; border-color: #3b82f6 !important; }
    .today-btn:hover { background: #2563eb !important; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filter-chip {
      display: flex; align-items: center; gap: 4px; padding: 4px 10px;
      border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer;
      border: 1.5px solid; transition: opacity 0.15s; user-select: none;
    }
    .filter-chip.inactive { opacity: 0.35; }
    .filter-chip .dot { width: 8px; height: 8px; border-radius: 50%; }
    .filter-chip[data-category="Event"] { background: var(--event-bg); border-color: var(--event-border); color: #854d0e; }
    .filter-chip[data-category="Event"] .dot { background: var(--event); }
    .filter-chip[data-category="Campaign"] { background: var(--campaign-bg); border-color: var(--campaign-border); color: #6b21a8; }
    .filter-chip[data-category="Campaign"] .dot { background: var(--campaign); }
    .filter-chip[data-category="Asset"] { background: var(--asset-bg); border-color: var(--asset-border); color: #92400e; }
    .filter-chip[data-category="Asset"] .dot { background: var(--asset); }
    .filter-chip[data-category="Project"] { background: var(--project-bg); border-color: var(--project-border); color: #9a3412; }
    .filter-chip[data-category="Project"] .dot { background: var(--project); }
    .filter-chip[data-category="PR & Comms"] { background: var(--pr-comms-bg); border-color: var(--pr-comms-border); color: #9d174d; }
    .filter-chip[data-category="PR & Comms"] .dot { background: var(--pr-comms); }
    .type-filters {
      display: flex; gap: 6px; margin-left: 12px; padding-left: 12px; border-left: 1px solid var(--border);
    }
    .type-pill {
      padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1.5px solid var(--border); background: white;
      color: var(--text-secondary); transition: all 0.15s; user-select: none;
    }
    .type-pill.active { background: var(--text); color: white; border-color: var(--text); }
    .status-filters {
      display: flex; gap: 6px; margin-left: 12px; padding-left: 12px; border-left: 1px solid var(--border);
    }
    .status-pill {
      padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1.5px solid var(--border); background: white;
      color: var(--text-secondary); transition: all 0.15s; user-select: none;
    }
    .status-pill.active { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
    .calendar { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .weekday-header {
      display: grid; grid-template-columns: repeat(7, 1fr);
      background: var(--border-light); border-bottom: 1px solid var(--border);
    }
    .weekday-header div {
      padding: 8px; text-align: center; font-size: 12px; font-weight: 600;
      color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;
    }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .calendar-day {
      min-height: 120px; border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border); padding: 4px; position: relative; overflow: hidden;
    }
    .calendar-day:nth-child(7n) { border-right: none; }
    .calendar-day.other-month { background: var(--border-light); }
    .calendar-day.other-month .day-number { color: #d1d5db; }
    .calendar-day.today { background: var(--today-bg); }
    .calendar-day.today .day-number {
      background: var(--today-border); color: white; border-radius: 50%;
      width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
    }
    .day-number { font-size: 13px; font-weight: 500; padding: 2px 4px; margin-bottom: 2px; display: inline-block; }
    .cal-item {
      font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-bottom: 2px;
      cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-weight: 500; border-left: 3px solid; transition: opacity 0.15s; position: relative;
    }
    .cal-item:hover { opacity: 0.85; }
    .cal-item.parent { font-weight: 600; }
    .cal-item.milestone { font-style: italic; }
    .cal-item.action-item { font-weight: 400; }
    .cal-item[data-category="Event"] { background: var(--event-bg); border-color: var(--event); color: #854d0e; }
    .cal-item[data-category="Campaign"] { background: var(--campaign-bg); border-color: var(--campaign); color: #6b21a8; }
    .cal-item[data-category="Asset"] { background: var(--asset-bg); border-color: var(--asset-border); color: #92400e; }
    .cal-item[data-category="Project"] { background: var(--project-bg); border-color: var(--project); color: #9a3412; }
    .cal-item[data-category="PR & Comms"] { background: var(--pr-comms-bg); border-color: var(--pr-comms); color: #9d174d; }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 3px; flex-shrink: 0;
    }
    .status-dot.done { background: #22c55e; }
    .status-dot.in-progress { background: #3b82f6; }
    .status-dot.not-started { background: #d1d5db; }
    .status-dot.backlog { background: #9ca3af; }
    .more-items {
      font-size: 10px; color: var(--text-secondary); padding: 1px 4px; cursor: pointer; text-align: center;
    }
    .more-items:hover { color: var(--text); text-decoration: underline; }
    .popup-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3);
      z-index: 1000; justify-content: center; align-items: center;
    }
    .popup-overlay.active { display: flex; }
    .popup {
      background: white; border-radius: 12px; padding: 24px; max-width: 480px;
      width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); position: relative;
    }
    .popup-close {
      position: absolute; top: 12px; right: 12px; background: none; border: none;
      font-size: 20px; cursor: pointer; color: var(--text-secondary);
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 4px;
    }
    .popup-close:hover { background: var(--border-light); }
    .popup h3 { font-size: 18px; margin-bottom: 12px; padding-right: 32px; }
    .popup-meta { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .popup-meta-row { display: flex; gap: 8px; font-size: 13px; }
    .popup-meta-label { color: var(--text-secondary); min-width: 80px; }
    .popup-meta-value { font-weight: 500; }
    .popup-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .popup-link {
      display: inline-block; margin-top: 12px; padding: 8px 16px; background: #1a1a1a;
      color: white; text-decoration: none; border-radius: 6px; font-size: 13px;
      font-weight: 500; transition: background 0.15s;
    }
    .popup-link:hover { background: #374151; }
    .stats-bar {
      display: flex; gap: 16px; margin-bottom: 16px; font-size: 13px;
      color: var(--text-secondary); flex-wrap: wrap;
    }
    .stat { display: flex; align-items: center; gap: 4px; }
    .stat strong { color: var(--text); }
    @media (max-width: 900px) {
      .calendar-day { min-height: 80px; }
      .cal-item { font-size: 10px; padding: 1px 4px; }
      .header { flex-direction: column; align-items: flex-start; }
    }
  </style>

        <h1>Activities Calendar</h1>

    </div>
    <div class="stats-bar" id="statsBar"></div>
    <div id="calendarContainer"></div>
    <div class="popup-overlay" id="popupOverlay" onclick="closePopup(event)">

      { id: "49", name: "SI Storage FAQ/brief", type: "Parent - Asset", category: "Asset", isParent: true, isMilestone: false, isActionItem: false, status: "Not started", startDate: { start: "2026-04-14" }, endDate: { start: "2026-04-25" }, parentItem: [], subItems: [], owner: [], notionUrl: "https://www.notion.so/3370571b42f3817d9124c9061a9ebff3" },
      { id: "50", name: "Customer Marketing: MSR", type: "Parent - Asset", category: "Asset", isParent: true, isMilestone: false, isActionItem: false, status: "In progress", startDate: { start: "2026-03-17" }, endDate: { start: "2026-04-11" }, parentItem: [], subItems: [], owner: [], notionUrl: "https://www.notion.so/3370571b42f38199b8dff7f564731eb5" },
      { id: "51", name: "Lambda 2026 Datacenter Content Plan", type: "Parent - Asset", category: "Asset", isParent: true, isMilestone: false, isActionItem: false, status: "In progress", startDate: { start: "2026-03-17" }, endDate: { start: "2026-04-04" }, parentItem: [], subItems: [], owner: [], notionUrl: "https://www.notion.so/3370571b42f381858442c3ecc5e6131c" },
      { id: "52", name: "New vLLM/Model Card section", type: "Milestone - Project", category: "Project", isParent: false, isMilestone: true, isActionItem: false, status: "In progress", startDate: { start: "2026-03-24" }, endDate: { start: "2026-04-11" }, parentItem: [], subItems: [], owner: [], notionUrl: "https://www.notion.so/3370571b42f38106b7f7c63b20737ee3" },
      { id: "53", name: "Run with VLLM guides", type: "Parent - Asset", category: "Asset", isParent: true, isMilestone: false, isActionItem: false, status: "In progress", startDate: { start: "2026-03-17" }, endDate: { start: "2026-04-04" }, parentItem: [], subItems: [], owner: [], notionUrl: "https://www.notion.so/3370571b42f3811e8db3e53a9d9b3bf7" },
      { id: "54", name: "Customer Marketing: MSR whitepaper", type: "Milestone - Asset", category: "Asset", isParent: false, isMilestone: true, isActionItem: false, status: "Not started", startDate: { start: "2026-04-07" }, endDate: { start: "2026-04-25" }, parentItem: [], subItems: [], owner: [], notionUrl: "https://www.notion.so/3370571b42f381aaa1d5cd75b5e8daad" },
    ];

    // ---- State ----
    let currentDate = new Date(2026, 3, 1); // April 2026
    let activeCategories = new Set(['Event', 'Campaign', 'Asset', 'Project', 'PR & Comms']);
    let activeTypes = new Set(['parent', 'milestone', 'action']);
    let statusFilter = 'all';
    const MAX_ITEMS_PER_DAY = 4;

    // ---- Stats ----
    function updateStats() {
      const withDates = activities.filter(a => a.startDate || a.endDate);
      const parents = activities.filter(a => a.isParent);
      const subs = activities.filter(a => !a.isParent);
      document.getElementById('statsBar').innerHTML = `
        <div class="stat"><strong>${activities.length}</strong> total items</div>
        <div class="stat"><strong>${withDates.length}</strong> with dates</div>
        <div class="stat"><strong>${parents.length}</strong> parents</div>
        <div class="stat"><strong>${subs.length}</strong> sub-items</div>
      `;
    }

    // ---- Filters ----
    function toggleCategory(cat) {
      const chip = document.querySelector(`.filter-chip[data-category="${cat}"]`);
      if (activeCategories.has(cat)) { activeCategories.delete(cat); chip.classList.add('inactive'); }
      else { activeCategories.add(cat); chip.classList.remove('inactive'); }
      renderCalendar();
    }
    function toggleType(type) {
      const pill = document.querySelector(`.type-pill[data-type="${type}"]`);
      if (activeTypes.has(type)) { activeTypes.delete(type); pill.classList.remove('active'); }
      else { activeTypes.add(type); pill.classList.add('active'); }
      renderCalendar();
    }
    function setStatusFilter(filter) {
      statusFilter = filter;
      document.querySelectorAll('.status-pill').forEach(p => p.classList.remove('active'));
      document.querySelector(`.status-pill[data-status="${filter}"]`).classList.add('active');
      renderCalendar();
    }
    function passesFilters(item) {
      if (!activeCategories.has(item.category)) return false;
      if (item.isParent && !activeTypes.has('parent')) return false;
      if (item.isMilestone && !activeTypes.has('milestone')) return false;
      if (item.isActionItem && !activeTypes.has('action')) return false;
      if (statusFilter === 'active' && item.status === 'Done') return false;
      if (statusFilter === 'done' && item.status !== 'Done') return false;
      return true;
    }

    // ---- Navigation ----
    function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); }
    function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); }
    function goToday() { currentDate = new Date(); renderCalendar(); }

    // ---- Calendar rendering ----
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('monthLabel').textContent =
        new Date(year, month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startOffset = firstDay.getDay();
      const totalDays = lastDay.getDate();
      const days = [];
      const prevMonthLast = new Date(year, month, 0).getDate();
      for (let i = startOffset - 1; i >= 0; i--) days.push({ date: new Date(year, month - 1, prevMonthLast - i), otherMonth: true });
      for (let d = 1; d <= totalDays; d++) days.push({ date: new Date(year, month, d), otherMonth: false });
      const remaining = 7 - (days.length % 7);
      if (remaining < 7) for (let d = 1; d <= remaining; d++) days.push({ date: new Date(year, month + 1, d), otherMonth: true });

      const today = new Date(); today.setHours(0, 0, 0, 0);
      let html = `<div class="calendar"><div class="weekday-header">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div><div class="calendar-grid">`;

      days.forEach(day => {
        const dateStr = formatDate(day.date);
        const isToday = day.date.getTime() === today.getTime();
        const classes = ['calendar-day'];
        if (day.otherMonth) classes.push('other-month');
        if (isToday) classes.push('today');
        const dayItems = getItemsForDate(dateStr);
        html += `<div class="${classes.join(' ')}">`;
        html += `<div class="day-number">${day.date.getDate()}</div>`;
        const visibleItems = dayItems.slice(0, MAX_ITEMS_PER_DAY);
        const hiddenCount = dayItems.length - MAX_ITEMS_PER_DAY;
        visibleItems.forEach(item => {
          const typeClass = item.isParent ? 'parent' : item.isMilestone ? 'milestone' : 'action-item';
          const statusClass = getStatusClass(item.status);
          const prefix = item.isParent ? '' : item.isMilestone ? '\u25C7 ' : '\u2022 ';
          html += `<div class="cal-item ${typeClass}" data-category="${item.category}"
                        onclick="showDetail('${item.id}')" title="${item.name}">
                    <span class="status-dot ${statusClass}"></span>${prefix}${item.name}
                   </div>`;
        });
        if (hiddenCount > 0) html += `<div class="more-items" onclick="showDayDetail('${dateStr}')">+${hiddenCount} more</div>`;
        html += `</div>`;
      });
      html += '</div></div>';
      document.getElementById('calendarContainer').innerHTML = html;
    }

    function getItemsForDate(dateStr) {
      return activities.filter(item => {
        if (!passesFilters(item)) return false;
        const start = item.startDate?.start;
        const end = item.endDate?.start;
        if (!start && !end) return false;

        // Only "Parent - Event" items span across their full date range
        const isParentEvent = item.type === 'Parent - Event';

        if (isParentEvent) {
          // Span from start to end
          if (start && !end) return start === dateStr;
          if (!start && end) return end === dateStr;
          return dateStr >= start && dateStr <= end;
        } else {
          // Everything else: show only on the end date (due date)
          // Fall back to start date if no end date exists
          const showDate = end || start;
          return showDate === dateStr;
        }
      });
    }

    // ---- Detail popup ----
    function showDetail(itemId) {
      const item = activities.find(a => a.id === itemId);
      if (!item) return;
      const categoryBadgeStyle = getCategoryBadgeStyle(item.category);
      const statusClass = getStatusClass(item.status);
      let parentName = '';
      if (item.parentItem.length > 0) { const p = activities.find(a => a.id === item.parentItem[0]); parentName = p ? p.name : ''; }
      const subItems = item.subItems.map(id => activities.find(a => a.id === id)).filter(Boolean);
      document.getElementById('popup').innerHTML = `
        <button class="popup-close" onclick="closePopup(event)">&times;</button>
        <h3>${item.name}</h3>
        <div class="popup-meta">
          <div class="popup-meta-row"><span class="popup-meta-label">Type</span><span class="popup-badge" style="${categoryBadgeStyle}">${item.type}</span></div>
          <div class="popup-meta-row"><span class="popup-meta-label">Status</span><span class="popup-meta-value"><span class="status-dot ${statusClass}"></span> ${item.status || 'N/A'}</span></div>
          ${item.startDate ? `<div class="popup-meta-row"><span class="popup-meta-label">Start</span><span class="popup-meta-value">${formatDisplayDate(item.startDate.start)}</span></div>` : ''}
          ${item.endDate ? `<div class="popup-meta-row"><span class="popup-meta-label">End / Due</span><span class="popup-meta-value">${formatDisplayDate(item.endDate.start)}</span></div>` : ''}
          ${item.strategicInitiative ? `<div class="popup-meta-row"><span class="popup-meta-label">Initiative</span><span class="popup-meta-value">${item.strategicInitiative}</span></div>` : ''}
          ${parentName ? `<div class="popup-meta-row"><span class="popup-meta-label">Parent</span><span class="popup-meta-value">${parentName}</span></div>` : ''}
          ${subItems.length > 0 ? `<div class="popup-meta-row"><span class="popup-meta-label">Sub-items</span><span class="popup-meta-value">${subItems.map(s => s.name).join(', ')}</span></div>` : ''}
        </div>
        <a class="popup-link" href="${item.notionUrl}" target="_blank" rel="noopener">Open in Notion &rarr;</a>
      `;
      document.getElementById('popupOverlay').classList.add('active');
    }

    function showDayDetail(dateStr) {
      const dayItems = getItemsForDate(dateStr);
      document.getElementById('popup').innerHTML = `
        <button class="popup-close" onclick="closePopup(event)">&times;</button>
        <h3>${formatDisplayDate(dateStr)}</h3>
        <div style="margin-top: 12px;">
          ${dayItems.map(item => {
            const categoryBadgeStyle = getCategoryBadgeStyle(item.category);
            const statusClass = getStatusClass(item.status);
            const prefix = item.isParent ? '' : item.isMilestone ? '\u25C7 ' : '\u2022 ';
            return `<div style="padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer;" onclick="showDetail('${item.id}')">
              <span class="status-dot ${statusClass}"></span><strong>${prefix}${item.name}</strong>
              <span class="popup-badge" style="${categoryBadgeStyle}; margin-left: 6px; font-size: 10px;">${item.type}</span>
            </div>`;
          }).join('')}
        </div>
      `;
      document.getElementById('popupOverlay').classList.add('active');
    }

    function closePopup(e) {
      if (e.target === document.getElementById('popupOverlay') || e.target.classList.contains('popup-close'))
        document.getElementById('popupOverlay').classList.remove('active');
    }

    // ---- Helpers ----
    function formatDate(date) { return date.toISOString().split('T')[0]; }
    function formatDisplayDate(dateStr) {
      if (!dateStr) return 'N/A';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    }
    function getStatusClass(status) {
      switch (status) {
        case 'Done': return 'done'; case 'In progress': return 'in-progress';
        case 'Not started': return 'not-started'; case 'Backlog': return 'backlog'; default: return 'not-started';
      }
    }
    function getCategoryBadgeStyle(category) {
      const s = {
        'Event': 'background: var(--event-bg); color: #854d0e; border: 1px solid var(--event-border)',
        'Campaign': 'background: var(--campaign-bg); color: #6b21a8; border: 1px solid var(--campaign-border)',
        'Asset': 'background: var(--asset-bg); color: #92400e; border: 1px solid var(--asset-border)',
        'Project': 'background: var(--project-bg); color: #9a3412; border: 1px solid var(--project-border)',
        'PR & Comms': 'background: var(--pr-comms-bg); color: #9d174d; border: 1px solid var(--pr-comms-border)',
      };
      return s[category] || 'background: #f3f4f6; color: #374151';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') document.getElementById('popupOverlay').classList.remove('active');
      if (e.key === 'ArrowLeft') prevMonth();
      if (e.key === 'ArrowRight') nextMonth();
    });

    // Init
    updateStats();
    renderCalendar();
  </script>
