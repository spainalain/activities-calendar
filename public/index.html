<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activities Calendar</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --border-light: #f3f4f6;
      --today-bg: #eff6ff;
      --today-border: #3b82f6;
      --hover: #f9fafb;

      /* Category colors — vibrant and distinct */
      --event: #d97706;
      --event-bg: #fff3d0;
      --event-border: #f59e0b;
      --campaign: #7c3aed;
      --campaign-bg: #ede9fe;
      --campaign-border: #8b5cf6;
      --asset: #0891b2;
      --asset-bg: #e0f7fa;
      --asset-border: #06b6d4;
      --project: #dc2626;
      --project-bg: #fee2e2;
      --project-border: #ef4444;
      --pr-comms: #c026d3;
      --pr-comms-bg: #fae8ff;
      --pr-comms-border: #d946ef;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .month-nav button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      transition: background 0.15s;
    }

    .month-nav button:hover {
      background: var(--hover);
    }

    .month-label {
      font-size: 16px;
      font-weight: 600;
      min-width: 180px;
      text-align: center;
    }

    .today-btn {
      background: #3b82f6 !important;
      color: white !important;
      border-color: #3b82f6 !important;
    }

    .today-btn:hover {
      background: #2563eb !important;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid;
      transition: opacity 0.15s;
      user-select: none;
    }

    .filter-chip.inactive {
      opacity: 0.35;
    }

    .filter-chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .filter-chip[data-category="Event"] { background: var(--event-bg); border-color: var(--event-border); color: #92400e; }
    .filter-chip[data-category="Event"] .dot { background: var(--event); }
    .filter-chip[data-category="Campaign"] { background: var(--campaign-bg); border-color: var(--campaign-border); color: #5b21b6; }
    .filter-chip[data-category="Campaign"] .dot { background: var(--campaign); }
    .filter-chip[data-category="Asset"] { background: var(--asset-bg); border-color: var(--asset-border); color: #0e7490; }
    .filter-chip[data-category="Asset"] .dot { background: var(--asset); }
    .filter-chip[data-category="Project"] { background: var(--project-bg); border-color: var(--project-border); color: #b91c1c; }
    .filter-chip[data-category="Project"] .dot { background: var(--project); }
    .filter-chip[data-category="PR & Comms"] { background: var(--pr-comms-bg); border-color: var(--pr-comms-border); color: #a21caf; }
    .filter-chip[data-category="PR & Comms"] .dot { background: var(--pr-comms); }

    /* Type filter pills */
    .type-filters {
      display: flex;
      gap: 6px;
      margin-left: 12px;
      padding-left: 12px;
      border-left: 1px solid var(--border);
    }

    .type-pill {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text-secondary);
      transition: all 0.15s;
      user-select: none;
    }

    .type-pill.active {
      background: var(--text);
      color: white;
      border-color: var(--text);
    }

    /* Status filter */
    .status-filters {
      display: flex;
      gap: 6px;
      margin-left: 12px;
      padding-left: 12px;
      border-left: 1px solid var(--border);
    }

    .status-pill {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text-secondary);
      transition: all 0.15s;
      user-select: none;
    }

    .status-pill.active {
      border-color: #3b82f6;
      background: #eff6ff;
      color: #1d4ed8;
    }

    /* Content info filters */
    .content-filters {
      display: flex;
      gap: 6px;
      margin-left: 12px;
      padding-left: 12px;
      border-left: 1px solid var(--border);
      align-items: center;
    }

    .content-filters label {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .content-select {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text);
      cursor: pointer;
      max-width: 160px;
    }

    .content-select:focus {
      outline: none;
      border-color: #3b82f6;
    }

    /* Calendar Grid */
    .calendar {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .weekday-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--border-light);
      border-bottom: 1px solid var(--border);
    }

    .weekday-header div {
      padding: 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .calendar-day {
      min-height: 120px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 4px;
      position: relative;
      overflow: hidden;
    }

    .calendar-day:nth-child(7n) {
      border-right: none;
    }

    .calendar-day.other-month {
      background: var(--border-light);
    }

    .calendar-day.other-month .day-number {
      color: #d1d5db;
    }

    .calendar-day.today {
      background: var(--today-bg);
    }

    .calendar-day.today .day-number {
      background: var(--today-border);
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .day-number {
      font-size: 13px;
      font-weight: 500;
      padding: 2px 4px;
      margin-bottom: 2px;
      display: inline-block;
    }

    /* Event items */
    .cal-item {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 2px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
      border-left: 3px solid;
      transition: opacity 0.15s;
      position: relative;
    }

    .cal-item:hover {
      opacity: 0.85;
    }

    .cal-item.parent { font-weight: 600; }
    .cal-item.milestone { font-style: italic; }
    .cal-item.action-item { font-weight: 400; }

    /* Category-specific item colors */
    .cal-item[data-category="Event"] { background: var(--event-bg); border-color: var(--event); color: #92400e; }
    .cal-item[data-category="Campaign"] { background: var(--campaign-bg); border-color: var(--campaign); color: #5b21b6; }
    .cal-item[data-category="Asset"] { background: var(--asset-bg); border-color: var(--asset); color: #0e7490; }
    .cal-item[data-category="Project"] { background: var(--project-bg); border-color: var(--project); color: #b91c1c; }
    .cal-item[data-category="PR & Comms"] { background: var(--pr-comms-bg); border-color: var(--pr-comms); color: #a21caf; }

    /* Multi-day spanning items — connected bar across days */
    .cal-item.span-start {
      border-radius: 4px 0 0 4px;
      margin-right: -4px;
      padding-right: 8px;
      position: relative;
      z-index: 2;
    }
    .cal-item.span-middle {
      border-radius: 0;
      margin-left: -4px;
      margin-right: -4px;
      border-left: none;
      color: transparent;
      position: relative;
      z-index: 1;
    }
    .cal-item.span-middle .status-dot { visibility: hidden; }
    .cal-item.span-end {
      border-radius: 0 4px 4px 0;
      margin-left: -4px;
      border-left: none;
      color: transparent;
      position: relative;
      z-index: 1;
    }
    .cal-item.span-end .status-dot { visibility: hidden; }

    /* Status dot */
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 3px;
      flex-shrink: 0;
    }

    .status-dot.done { background: #22c55e; }
    .status-dot.in-progress { background: #3b82f6; }
    .status-dot.not-started { background: #d1d5db; }
    .status-dot.backlog { background: #9ca3af; }

    /* More items indicator */
    .more-items {
      font-size: 10px;
      color: var(--text-secondary);
      padding: 1px 4px;
      cursor: pointer;
      text-align: center;
    }

    .more-items:hover {
      color: var(--text);
      text-decoration: underline;
    }

    /* Tooltip / Popup */
    .popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .popup-overlay.active {
      display: flex;
    }

    .popup {
      background: white;
      border-radius: 12px;
      padding: 24px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      position: relative;
    }

    .popup-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-secondary);
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    .popup-close:hover {
      background: var(--border-light);
    }

    .popup h3 {
      font-size: 18px;
      margin-bottom: 12px;
      padding-right: 32px;
    }

    .popup-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .popup-meta-row {
      display: flex;
      gap: 8px;
      font-size: 13px;
    }

    .popup-meta-label {
      color: var(--text-secondary);
      min-width: 80px;
    }

    .popup-meta-value {
      font-weight: 500;
    }

    .popup-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .popup-link {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 16px;
      background: #1a1a1a;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }

    .popup-link:hover {
      background: #374151;
    }

    /* Loading & Error states */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      text-align: center;
      padding: 40px 20px;
      color: #dc2626;
      background: #fef2f2;
      border-radius: 8px;
      margin: 20px 0;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text-secondary);
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat strong {
      color: var(--text);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .calendar-day { min-height: 80px; }
      .cal-item { font-size: 10px; padding: 1px 4px; }
      .header { flex-direction: column; align-items: flex-start; }
      .filters { margin-top: 8px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-left">
        <h1>Activities Calendar</h1>
        <div class="month-nav">
          <button onclick="prevMonth()">&larr;</button>
          <span class="month-label" id="monthLabel"></span>
          <button onclick="nextMonth()">&rarr;</button>
          <button class="today-btn" onclick="goToday()">Today</button>
        </div>
      </div>
    </div>

    <div class="filters" id="filters">
      <!-- Category filters -->
      <div class="filter-chip" data-category="Event" onclick="toggleCategory('Event')">
        <span class="dot"></span> Event
      </div>
      <div class="filter-chip" data-category="Campaign" onclick="toggleCategory('Campaign')">
        <span class="dot"></span> Campaign
      </div>
      <div class="filter-chip" data-category="Asset" onclick="toggleCategory('Asset')">
        <span class="dot"></span> Asset
      </div>
      <div class="filter-chip" data-category="Project" onclick="toggleCategory('Project')">
        <span class="dot"></span> Project
      </div>
      <div class="filter-chip" data-category="PR & Comms" onclick="toggleCategory('PR & Comms')">
        <span class="dot"></span> PR & Comms
      </div>

      <!-- Type filters -->
      <div class="type-filters">
        <div class="type-pill active" data-type="parent" onclick="toggleType('parent')">Parent</div>
        <div class="type-pill active" data-type="milestone" onclick="toggleType('milestone')">Milestone</div>
        <div class="type-pill active" data-type="action" onclick="toggleType('action')">Action Item</div>
      </div>

      <!-- Status filters -->
      <div class="status-filters">
        <div class="status-pill active" data-status="all" onclick="setStatusFilter('all')">All</div>
        <div class="status-pill" data-status="active" onclick="setStatusFilter('active')">Active</div>
        <div class="status-pill" data-status="done" onclick="setStatusFilter('done')">Done</div>
      </div>

      <!-- Content information filters (Asset items only) -->
      <div class="content-filters">
        <label>Content:</label>
        <select class="content-select" id="contentStatusFilter" onchange="renderCalendar()">
          <option value="">All Statuses</option>
        </select>
        <select class="content-select" id="contentObjectiveFilter" onchange="renderCalendar()">
          <option value="">All Objectives</option>
        </select>
        <select class="content-select" id="contentTrackFilter" onchange="renderCalendar()">
          <option value="">All Tracks</option>
        </select>
      </div>
    </div>

    <div class="stats-bar" id="statsBar"></div>

    <div id="calendarContainer">
      <div class="loading">
        <div class="spinner"></div>
        Loading activities...
      </div>
    </div>

    <!-- Detail popup -->
    <div class="popup-overlay" id="popupOverlay" onclick="closePopup(event)">
      <div class="popup" id="popup"></div>
    </div>
  </div>

  <script>
    // ---- State ----
    let currentDate = new Date();
    let activities = [];
    let activeCategories = new Set(['Event', 'Campaign', 'Asset', 'Project', 'PR & Comms']);
    let activeTypes = new Set(['parent', 'milestone', 'action']);
    let statusFilter = 'all';

    const MAX_ITEMS_PER_DAY = 4;

    // ---- Data fetching ----
    async function fetchActivities(retries = 3) {
      for (let attempt = 1; attempt <= retries; attempt++) {
        try {
          document.getElementById('calendarContainer').innerHTML =
            `<div class="loading"><div class="spinner"></div>Loading activities...${attempt > 1 ? ` (attempt ${attempt}/${retries})` : ''}</div>`;

          const res = await fetch('/api/activities', { signal: AbortSignal.timeout(120000) });
          const json = await res.json();
          if (json.success) {
            activities = json.data;
            populateContentFilters();
            updateStats();
            renderCalendar();
            return;
          } else {
            if (attempt === retries) showError(json.error);
          }
        } catch (err) {
          if (attempt === retries) {
            showError('Could not connect to server. It may be waking up — try refreshing in 30 seconds.');
          }
          // Wait before retrying (server may be cold-starting)
          await new Promise(r => setTimeout(r, 5000));
        }
      }
    }

    // Populate Content info filter dropdowns from actual data
    function populateContentFilters() {
      const statuses = new Set();
      const objectives = new Set();
      const tracks = new Set();

      activities.forEach(a => {
        if (a.contentStatus) statuses.add(a.contentStatus);
        if (a.contentObjective) objectives.add(a.contentObjective);
        if (a.contentTrack) tracks.add(a.contentTrack);
      });

      const fillSelect = (id, values) => {
        const sel = document.getElementById(id);
        const current = sel.value;
        // Keep the "All" option, add sorted values
        sel.innerHTML = sel.options[0].outerHTML;
        [...values].sort().forEach(v => {
          const opt = document.createElement('option');
          opt.value = v;
          opt.textContent = v;
          sel.appendChild(opt);
        });
        sel.value = current; // preserve selection if still valid
      };

      fillSelect('contentStatusFilter', statuses);
      fillSelect('contentObjectiveFilter', objectives);
      fillSelect('contentTrackFilter', tracks);
    }

    function showError(msg) {
      document.getElementById('calendarContainer').innerHTML =
        `<div class="error"><strong>Error:</strong> ${msg}</div>`;
    }

    // ---- Stats ----
    function updateStats() {
      const withDates = activities.filter(a => a.startDate || a.endDate);
      const parents = activities.filter(a => a.isParent);
      const subs = activities.filter(a => !a.isParent);
      const bar = document.getElementById('statsBar');
      bar.innerHTML = `
        <div class="stat"><strong>${activities.length}</strong> total items</div>
        <div class="stat"><strong>${withDates.length}</strong> with dates</div>
        <div class="stat"><strong>${parents.length}</strong> parents</div>
        <div class="stat"><strong>${subs.length}</strong> sub-items</div>
      `;
    }

    // ---- Filters ----
    function toggleCategory(cat) {
      const chip = document.querySelector(`.filter-chip[data-category="${cat}"]`);
      if (activeCategories.has(cat)) {
        activeCategories.delete(cat);
        chip.classList.add('inactive');
      } else {
        activeCategories.add(cat);
        chip.classList.remove('inactive');
      }
      renderCalendar();
    }

    function toggleType(type) {
      const pill = document.querySelector(`.type-pill[data-type="${type}"]`);
      if (activeTypes.has(type)) {
        activeTypes.delete(type);
        pill.classList.remove('active');
      } else {
        activeTypes.add(type);
        pill.classList.add('active');
      }
      renderCalendar();
    }

    function setStatusFilter(filter) {
      statusFilter = filter;
      document.querySelectorAll('.status-pill').forEach(p => p.classList.remove('active'));
      document.querySelector(`.status-pill[data-status="${filter}"]`).classList.add('active');
      renderCalendar();
    }

    function passesFilters(item) {
      // Category filter
      if (!activeCategories.has(item.category)) return false;

      // Type filter
      if (item.isParent && !activeTypes.has('parent')) return false;
      if (item.isMilestone && !activeTypes.has('milestone')) return false;
      if (item.isActionItem && !activeTypes.has('action')) return false;

      // Status filter
      if (statusFilter === 'active' && item.status === 'Done') return false;
      if (statusFilter === 'done' && item.status !== 'Done') return false;

      // Content info filters (only apply to Asset items)
      const csFilter = document.getElementById('contentStatusFilter')?.value;
      const coFilter = document.getElementById('contentObjectiveFilter')?.value;
      const ctFilter = document.getElementById('contentTrackFilter')?.value;

      if (csFilter || coFilter || ctFilter) {
        if (item.category === 'Asset') {
          if (csFilter && item.contentStatus !== csFilter) return false;
          if (coFilter && item.contentObjective !== coFilter) return false;
          if (ctFilter && item.contentTrack !== ctFilter) return false;
        }
        // Non-Asset items always pass content filters
      }

      return true;
    }

    // ---- Navigation ----
    function prevMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    }

    function goToday() {
      currentDate = new Date();
      renderCalendar();
    }

    // ---- Calendar rendering ----
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      document.getElementById('monthLabel').textContent =
        new Date(year, month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startOffset = firstDay.getDay(); // 0=Sun
      const totalDays = lastDay.getDate();

      // Build day cells
      const days = [];

      // Previous month fill
      const prevMonthLast = new Date(year, month, 0).getDate();
      for (let i = startOffset - 1; i >= 0; i--) {
        days.push({ date: new Date(year, month - 1, prevMonthLast - i), otherMonth: true });
      }

      // Current month
      for (let d = 1; d <= totalDays; d++) {
        days.push({ date: new Date(year, month, d), otherMonth: false });
      }

      // Next month fill (complete last week)
      const remaining = 7 - (days.length % 7);
      if (remaining < 7) {
        for (let d = 1; d <= remaining; d++) {
          days.push({ date: new Date(year, month + 1, d), otherMonth: true });
        }
      }

      // Get items for each day
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let html = `
        <div class="calendar">
          <div class="weekday-header">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
          </div>
          <div class="calendar-grid">
      `;

      // Process weeks for slot-based rendering
      // This ensures multi-day spanning items stay on the same row across all days
      for (let weekStart = 0; weekStart < days.length; weekStart += 7) {
        const weekDays = days.slice(weekStart, weekStart + 7);
        const weekDateStrs = weekDays.map(d => formatDate(d.date));

        // Build items list for each day in this week
        const weekDayItems = weekDateStrs.map(ds => getItemsForDate(ds));

        // Identify spanning items that cross multiple days in this week
        // and assign them fixed slot positions
        const slotAssignments = {}; // itemId -> slot number
        const daySlots = weekDateStrs.map(() => []); // for each day, array of {slot, item} or null

        // First pass: find spanning items and assign slots
        const spanningItems = [];
        activities.forEach(item => {
          if (item.type !== 'Parent - Event') return;
          if (!passesFilters(item)) return;
          const start = item.startDate?.start;
          const end = item.endDate?.start;
          if (!start || !end || start === end) return;

          // Check if this item overlaps with this week
          const weekFirst = weekDateStrs[0];
          const weekLast = weekDateStrs[6];
          if (end < weekFirst || start > weekLast) return;

          // Find which days in this week the item spans
          const dayIndices = [];
          weekDateStrs.forEach((ds, i) => {
            if (ds >= start && ds <= end) dayIndices.push(i);
          });
          if (dayIndices.length <= 1) return;

          spanningItems.push({ item, dayIndices });
        });

        // Sort spanning items by start date, then by length (longer first)
        spanningItems.sort((a, b) => {
          const aStart = a.item.startDate?.start || '';
          const bStart = b.item.startDate?.start || '';
          if (aStart !== bStart) return aStart.localeCompare(bStart);
          return b.dayIndices.length - a.dayIndices.length;
        });

        // Assign slots to spanning items
        spanningItems.forEach(({ item, dayIndices }) => {
          // Find the lowest slot that is free across all days this item spans
          let slot = 0;
          while (true) {
            const conflict = dayIndices.some(di => daySlots[di][slot] != null);
            if (!conflict) break;
            slot++;
          }
          slotAssignments[item.id] = slot;
          dayIndices.forEach(di => {
            daySlots[di][slot] = item;
          });
        });

        // Second pass: for each day, fill remaining slots with non-spanning items
        weekDayItems.forEach((items, dayIdx) => {
          const nonSpanning = items.filter(it => !(it.id in slotAssignments));
          let slot = 0;
          nonSpanning.forEach(item => {
            // Find next free slot
            while (daySlots[dayIdx][slot] != null) slot++;
            daySlots[dayIdx][slot] = item;
            slot++;
          });
        });

        // Now render each day in this week using the slot layout
        weekDays.forEach((day, dayIdx) => {
          const dateStr = weekDateStrs[dayIdx];
          const isToday = day.date.getTime() === today.getTime();
          const classes = ['calendar-day'];
          if (day.otherMonth) classes.push('other-month');
          if (isToday) classes.push('today');

          html += `<div class="${classes.join(' ')}">`;
          html += `<div class="day-number">${day.date.getDate()}</div>`;

          const slots = daySlots[dayIdx];
          // Find max slot index used
          const maxSlot = slots.length - 1;
          let rendered = 0;

          for (let s = 0; s <= Math.min(maxSlot, MAX_ITEMS_PER_DAY - 1); s++) {
            const item = slots[s];
            if (!item) {
              // Empty slot — render a spacer to keep alignment
              html += `<div class="cal-item" style="visibility:hidden;height:18px;margin-bottom:2px;">&nbsp;</div>`;
              rendered++;
              continue;
            }

            const typeClass = item.isParent ? 'parent' : item.isMilestone ? 'milestone' : 'action-item';
            const statusClass = getStatusClass(item.status);
            const prefix = item.isParent ? '' : item.isMilestone ? '\u25C7 ' : '\u2022 ';

            // Determine span class for multi-day Parent-Event items
            let spanClass = '';
            if (item.id in slotAssignments) {
              const start = item.startDate?.start;
              const end = item.endDate?.start;
              if (dateStr === start) spanClass = 'span-start';
              else if (dateStr === end) spanClass = 'span-end';
              else spanClass = 'span-middle';
            }

            html += `<div class="cal-item ${typeClass} ${spanClass}" data-category="${item.category}"
                          onclick="showDetail('${item.id}')" title="${item.name}">
                      <span class="status-dot ${statusClass}"></span>${prefix}${item.name}
                     </div>`;
            rendered++;
          }

          // Count items beyond visible slots
          const totalItems = slots.filter(s => s != null).length;
          const hiddenCount = totalItems - rendered;
          if (hiddenCount > 0) {
            html += `<div class="more-items" onclick="showDayDetail('${dateStr}')">+${hiddenCount} more</div>`;
          }

          html += `</div>`;
        });
      }

      html += '</div></div>';

      document.getElementById('calendarContainer').innerHTML = html;
    }

    function getItemsForDate(dateStr) {
      return activities.filter(item => {
        if (!passesFilters(item)) return false;

        const start = item.startDate?.start;
        const end = item.endDate?.start;

        if (!start && !end) return false;

        // Only "Parent - Event" items span across their full date range
        const isParentEvent = item.type === 'Parent - Event';

        if (isParentEvent) {
          if (start && !end) return start === dateStr;
          if (!start && end) return end === dateStr;
          return dateStr >= start && dateStr <= end;
        } else {
          // Everything else: show only on the end date (due date)
          // Fall back to start date if no end date exists
          const showDate = end || start;
          return showDate === dateStr;
        }
      });
    }

    // ---- Detail popup ----
    function showDetail(itemId) {
      const item = activities.find(a => a.id === itemId);
      if (!item) return;

      const categoryBadgeStyle = getCategoryBadgeStyle(item.category);
      const statusClass = getStatusClass(item.status);

      // Find parent name if exists
      let parentName = '';
      if (item.parentItem.length > 0) {
        const parent = activities.find(a => a.id === item.parentItem[0]);
        parentName = parent ? parent.name : '';
      }

      // Find sub-items
      const subItems = item.subItems
        .map(id => activities.find(a => a.id === id))
        .filter(Boolean);

      const popup = document.getElementById('popup');
      popup.innerHTML = `
        <button class="popup-close" onclick="closePopup(event)">&times;</button>
        <h3>${item.name}</h3>
        <div class="popup-meta">
          <div class="popup-meta-row">
            <span class="popup-meta-label">Type</span>
            <span class="popup-badge" style="${categoryBadgeStyle}">${item.type}</span>
          </div>
          <div class="popup-meta-row">
            <span class="popup-meta-label">Status</span>
            <span class="popup-meta-value"><span class="status-dot ${statusClass}"></span> ${item.status || 'N/A'}</span>
          </div>
          ${item.startDate ? `
          <div class="popup-meta-row">
            <span class="popup-meta-label">Start</span>
            <span class="popup-meta-value">${formatDisplayDate(item.startDate.start)}</span>
          </div>` : ''}
          ${item.endDate ? `
          <div class="popup-meta-row">
            <span class="popup-meta-label">End / Due</span>
            <span class="popup-meta-value">${formatDisplayDate(item.endDate.start)}</span>
          </div>` : ''}
          ${item.owner.length > 0 ? `
          <div class="popup-meta-row">
            <span class="popup-meta-label">Owner</span>
            <span class="popup-meta-value">${item.owner.join(', ')}</span>
          </div>` : ''}
          ${item.strategicInitiative ? `
          <div class="popup-meta-row">
            <span class="popup-meta-label">Initiative</span>
            <span class="popup-meta-value">${item.strategicInitiative}</span>
          </div>` : ''}
          ${parentName ? `
          <div class="popup-meta-row">
            <span class="popup-meta-label">Parent</span>
            <span class="popup-meta-value">${parentName}</span>
          </div>` : ''}
          ${subItems.length > 0 ? `
          <div class="popup-meta-row">
            <span class="popup-meta-label">Sub-items</span>
            <span class="popup-meta-value">${subItems.map(s => s.name).join(', ')}</span>
          </div>` : ''}
        </div>
          ${(item.contentStatus || item.contentObjective || item.contentTrack) ? `
          <h4 style="font-size: 14px; font-weight: 600; margin: 16px 0 8px; padding-top: 12px; border-top: 1px solid var(--border); color: var(--text);">Content Information</h4>
          <div class="popup-meta" style="margin-bottom: 16px;">
            ${item.contentStatus ? `
            <div class="popup-meta-row">
              <span class="popup-meta-label">Status</span>
              <span class="popup-meta-value">${item.contentStatus}</span>
            </div>` : ''}
            ${item.contentObjective ? `
            <div class="popup-meta-row">
              <span class="popup-meta-label">Objective</span>
              <span class="popup-meta-value">${item.contentObjective}</span>
            </div>` : ''}
            ${item.contentTrack ? `
            <div class="popup-meta-row">
              <span class="popup-meta-label">Track</span>
              <span class="popup-meta-value">${item.contentTrack}</span>
            </div>` : ''}
          </div>` : ''}
        <a class="popup-link" href="${item.notionUrl}" target="_blank" rel="noopener">Open in Notion &rarr;</a>
      `;

      document.getElementById('popupOverlay').classList.add('active');
    }

    function showDayDetail(dateStr) {
      const dayItems = getItemsForDate(dateStr);
      const popup = document.getElementById('popup');

      popup.innerHTML = `
        <button class="popup-close" onclick="closePopup(event)">&times;</button>
        <h3>${formatDisplayDate(dateStr)}</h3>
        <div style="margin-top: 12px;">
          ${dayItems.map(item => {
            const categoryBadgeStyle = getCategoryBadgeStyle(item.category);
            const statusClass = getStatusClass(item.status);
            const prefix = item.isParent ? '' : item.isMilestone ? '\u25C7 ' : '\u2022 ';
            return `
              <div style="padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer;"
                   onclick="showDetail('${item.id}')">
                <span class="status-dot ${statusClass}"></span>
                <strong>${prefix}${item.name}</strong>
                <span class="popup-badge" style="${categoryBadgeStyle}; margin-left: 6px; font-size: 10px;">${item.type}</span>
              </div>`;
          }).join('')}
        </div>
      `;

      document.getElementById('popupOverlay').classList.add('active');
    }

    function closePopup(e) {
      if (e.target === document.getElementById('popupOverlay') || e.target.classList.contains('popup-close')) {
        document.getElementById('popupOverlay').classList.remove('active');
      }
    }

    // ---- Helpers ----
    function formatDate(date) {
      return date.toISOString().split('T')[0];
    }

    function formatDisplayDate(dateStr) {
      if (!dateStr) return 'N/A';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    }

    function getStatusClass(status) {
      switch (status) {
        case 'Done': return 'done';
        case 'In progress': return 'in-progress';
        case 'Not started': return 'not-started';
        case 'Backlog': return 'backlog';
        default: return 'not-started';
      }
    }

    function getCategoryBadgeStyle(category) {
      const styles = {
        'Event': 'background: var(--event-bg); color: #92400e; border: 1px solid var(--event-border)',
        'Campaign': 'background: var(--campaign-bg); color: #5b21b6; border: 1px solid var(--campaign-border)',
        'Asset': 'background: var(--asset-bg); color: #0e7490; border: 1px solid var(--asset-border)',
        'Project': 'background: var(--project-bg); color: #b91c1c; border: 1px solid var(--project-border)',
        'PR & Comms': 'background: var(--pr-comms-bg); color: #a21caf; border: 1px solid var(--pr-comms-border)',
      };
      return styles[category] || 'background: #f3f4f6; color: #374151';
    }

    // Keyboard nav
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.getElementById('popupOverlay').classList.remove('active');
      }
      if (e.key === 'ArrowLeft') prevMonth();
      if (e.key === 'ArrowRight') nextMonth();
    });

    // ---- Init ----
    fetchActivities();
  </script>
</body>
</html>
