<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activities Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Lambda 2.0 Brand — Primary palette */
      --terminal: #0B0B0B;
      --shell: #E7E6D9;
      --ultraviolet: #6236F4;

      /* Lambda 2.0 Brand — Secondary palette */
      --lambda-red: #E70000;
      --lambda-blue: #0000D9;
      --lambda-green: #00E600;
      --lambda-cyan: #00E6D9;
      --lambda-magenta: #E700D9;
      --lambda-yellow: #E7E600;

      /* App tokens mapped from brand */
      --bg: #ffffff;
      --text: var(--terminal);
      --text-secondary: #5c5c52;
      --border: #d0cfbf;
      --border-light: var(--shell);
      --today-bg: #ede9fe;
      --today-border: var(--ultraviolet);
      --hover: #f2f1e8;

      /* Category colors — Lambda secondary palette */
      --event: #c46800;
      --event-bg: #fef5e7;
      --event-border: #e09030;
      --campaign: var(--ultraviolet);
      --campaign-bg: #ede9fe;
      --campaign-border: #7c5df7;
      --asset: #00a5a0;
      --asset-bg: #e6faf9;
      --asset-border: var(--lambda-cyan);
      --project: var(--lambda-red);
      --project-bg: #fde8e8;
      --project-border: #ff3333;
      --pr-comms: #c000b8;
      --pr-comms-bg: #fce8fc;
      --pr-comms-border: var(--lambda-magenta);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header h1 {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .month-nav button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      transition: background 0.15s;
    }

    .month-nav button:hover {
      background: var(--hover);
    }

    .month-label {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
      min-width: 180px;
      text-align: center;
    }

    .today-btn {
      background: var(--ultraviolet) !important;
      color: white !important;
      border-color: var(--ultraviolet) !important;
    }

    .today-btn:hover {
      background: #4e20d0 !important;
    }

    /* Filter rows — stacked cleanly */
    .filter-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-row-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      min-width: 70px;
    }

    .filter-row-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }

    .filter-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid;
      transition: opacity 0.15s;
      user-select: none;
    }

    .filter-chip.inactive {
      opacity: 0.35;
    }

    .filter-chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .filter-chip[data-category="Event"] { background: var(--event-bg); border-color: var(--event-border); color: #8a5000; }
    .filter-chip[data-category="Event"] .dot { background: var(--event); }
    .filter-chip[data-category="Campaign"] { background: var(--campaign-bg); border-color: var(--campaign-border); color: #4a22c4; }
    .filter-chip[data-category="Campaign"] .dot { background: var(--campaign); }
    .filter-chip[data-category="Asset"] { background: var(--asset-bg); border-color: var(--asset-border); color: #007a77; }
    .filter-chip[data-category="Asset"] .dot { background: var(--asset); }
    .filter-chip[data-category="Project"] { background: var(--project-bg); border-color: var(--project-border); color: #b80000; }
    .filter-chip[data-category="Project"] .dot { background: var(--project); }
    .filter-chip[data-category="PR & Comms"] { background: var(--pr-comms-bg); border-color: var(--pr-comms-border); color: #9a0093; }
    .filter-chip[data-category="PR & Comms"] .dot { background: var(--pr-comms); }

    /* Pill filters (type, status) */
    .pill {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text-secondary);
      transition: all 0.15s;
      user-select: none;
    }

    .pill.active {
      background: var(--text);
      color: white;
      border-color: var(--text);
    }

    .pill.status-active {
      border-color: var(--ultraviolet);
      background: #ede9fe;
      color: var(--ultraviolet);
    }

    /* Dropdown filters */
    .filter-select {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text);
      cursor: pointer;
      max-width: 200px;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--ultraviolet);
    }

    /* Calendar Grid */
    .calendar {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .weekday-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--border-light);
      border-bottom: 1px solid var(--border);
    }

    .weekday-header div {
      padding: 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .calendar-day {
      min-height: 120px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 4px;
      position: relative;
      overflow: hidden;
    }

    .calendar-day:nth-child(7n) {
      border-right: none;
    }

    .calendar-day.other-month {
      background: var(--border-light);
    }

    .calendar-day.other-month .day-number {
      color: #d1d5db;
    }

    .calendar-day.today {
      background: var(--today-bg);
    }

    .calendar-day.today .day-number {
      background: var(--today-border);
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .day-number {
      font-size: 13px;
      font-weight: 500;
      padding: 2px 4px;
      margin-bottom: 2px;
      display: inline-block;
    }

    /* Event items */
    .cal-item {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 2px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
      border-left: 3px solid;
      transition: opacity 0.15s;
      position: relative;
    }

    .cal-item:hover {
      opacity: 0.85;
    }

    .cal-item.parent { font-weight: 600; }
    .cal-item.milestone { font-style: italic; }
    .cal-item.action-item { font-weight: 400; }

    /* Category-specific item colors */
    .cal-item[data-category="Event"] { background: var(--event-bg); border-color: var(--event); color: #8a5000; }
    .cal-item[data-category="Campaign"] { background: var(--campaign-bg); border-color: var(--campaign); color: #4a22c4; }
    .cal-item[data-category="Asset"] { background: var(--asset-bg); border-color: var(--asset); color: #007a77; }
    .cal-item[data-category="Project"] { background: var(--project-bg); border-color: var(--project); color: #b80000; }
    .cal-item[data-category="PR & Comms"] { background: var(--pr-comms-bg); border-color: var(--pr-comms); color: #9a0093; }

    /* Multi-day spanning items — connected bar across days */
    .cal-item.span-start {
      border-radius: 4px 0 0 4px;
      margin-right: -4px;
      padding-right: 8px;
      position: relative;
      z-index: 2;
    }
    .cal-item.span-middle {
      border-radius: 0;
      margin-left: -4px;
      margin-right: -4px;
      border-left: none;
      color: transparent;
      position: relative;
      z-index: 1;
    }
    .cal-item.span-middle .status-dot { visibility: hidden; }
    .cal-item.span-end {
      border-radius: 0 4px 4px 0;
      margin-left: -4px;
      border-left: none;
      color: transparent;
      position: relative;
      z-index: 1;
    }
    .cal-item.span-end .status-dot { visibility: hidden; }

    /* Status dot */
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 3px;
      flex-shrink: 0;
    }

    .status-dot.done { background: #22c55e; }
    .status-dot.in-progress { background: var(--ultraviolet); }
    .status-dot.not-started { background: #d1d5db; }
    .status-dot.backlog { background: #9ca3af; }

    /* More items indicator */
    .more-items {
      font-size: 10px;
      color: var(--text-secondary);
      padding: 1px 4px;
      cursor: pointer;
      text-align: center;
    }

    .more-items:hover {
      color: var(--text);
      text-decoration: underline;
    }

    /* Tooltip / Popup */
    .popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .popup-overlay.active {
      display: flex;
    }

    .popup {
      background: white;
      border-radius: 12px;
      padding: 24px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      position: relative;
    }

    .popup-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-secondary);
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    .popup-close:hover {
      background: var(--border-light);
    }

    .popup h3 {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      padding-right: 32px;
    }

    .popup-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .popup-meta-row {
      display: flex;
      gap: 8px;
      font-size: 13px;
    }

    .popup-meta-label {
      color: var(--text-secondary);
      min-width: 80px;
    }

    .popup-meta-value {
      font-weight: 500;
    }

    .popup-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .popup-link {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 16px;
      background: var(--terminal);
      color: var(--shell);
      text-decoration: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }

    .popup-link:hover {
      background: var(--ultraviolet);
    }

    /* Loading & Error states */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--ultraviolet);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      text-align: center;
      padding: 40px 20px;
      color: var(--lambda-red);
      background: var(--project-bg);
      border-radius: 8px;
      margin: 20px 0;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text-secondary);
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat strong {
      color: var(--text);
    }

    /* Saved views / presets bar */
    .views-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .views-bar label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .view-btn {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text);
      transition: all 0.15s;
    }

    .view-btn:hover {
      background: var(--hover);
    }

    .view-btn.active {
      background: var(--terminal);
      color: var(--shell);
      border-color: var(--terminal);
    }

    .view-btn.save-btn {
      border-style: dashed;
      color: var(--text-secondary);
    }

    .view-btn.save-btn:hover {
      border-color: var(--ultraviolet);
      color: var(--ultraviolet);
    }

    .view-btn.delete-btn {
      font-size: 10px;
      padding: 2px 6px;
      color: var(--lambda-red);
      border-color: transparent;
      background: transparent;
    }

    .view-btn.delete-btn:hover {
      background: var(--project-bg);
    }

    /* ---- Dark Mode (Lambda Terminal theme) ---- */
    [data-theme="dark"] {
      --bg: #0B0B0B;
      --text: #E7E6D9;
      --text-secondary: #a8a793;
      --border: #2a2a28;
      --border-light: #161614;
      --today-bg: #1e1545;
      --today-border: var(--ultraviolet);
      --hover: #1c1c1a;

      /* Category colors — brighter for dark backgrounds */
      --event: #f0a030;
      --event-bg: #2a1e08;
      --event-border: #c47a10;
      --campaign: #8b6cf7;
      --campaign-bg: #1a1230;
      --campaign-border: #6236F4;
      --asset: #20d4cc;
      --asset-bg: #081e1d;
      --asset-border: #00a59e;
      --project: #ff4444;
      --project-bg: #2a0808;
      --project-border: #cc0000;
      --pr-comms: #e850e0;
      --pr-comms-bg: #280828;
      --pr-comms-border: #b800b0;
    }

    [data-theme="dark"] .pill {
      background: var(--bg);
      border-color: var(--border);
      color: var(--text-secondary);
    }

    [data-theme="dark"] .pill.active {
      background: var(--shell);
      color: var(--terminal);
      border-color: var(--shell);
    }

    [data-theme="dark"] .pill.status-active {
      background: #1a1230;
      border-color: var(--ultraviolet);
      color: #a78bfa;
    }

    [data-theme="dark"] .filter-select {
      background: #161614;
      border-color: var(--border);
      color: var(--text);
    }

    [data-theme="dark"] .filter-chip[data-category="Event"] { background: var(--event-bg); border-color: var(--event-border); color: #f0a030; }
    [data-theme="dark"] .filter-chip[data-category="Campaign"] { background: var(--campaign-bg); border-color: var(--campaign-border); color: #a78bfa; }
    [data-theme="dark"] .filter-chip[data-category="Asset"] { background: var(--asset-bg); border-color: var(--asset-border); color: #20d4cc; }
    [data-theme="dark"] .filter-chip[data-category="Project"] { background: var(--project-bg); border-color: var(--project-border); color: #ff6666; }
    [data-theme="dark"] .filter-chip[data-category="PR & Comms"] { background: var(--pr-comms-bg); border-color: var(--pr-comms-border); color: #e850e0; }

    [data-theme="dark"] .cal-item[data-category="Event"] { background: var(--event-bg); border-color: var(--event); color: #f0a030; }
    [data-theme="dark"] .cal-item[data-category="Campaign"] { background: var(--campaign-bg); border-color: var(--campaign); color: #a78bfa; }
    [data-theme="dark"] .cal-item[data-category="Asset"] { background: var(--asset-bg); border-color: var(--asset); color: #20d4cc; }
    [data-theme="dark"] .cal-item[data-category="Project"] { background: var(--project-bg); border-color: var(--project); color: #ff6666; }
    [data-theme="dark"] .cal-item[data-category="PR & Comms"] { background: var(--pr-comms-bg); border-color: var(--pr-comms); color: #e850e0; }

    [data-theme="dark"] .calendar-day.other-month .day-number { color: #3a3a35; }

    [data-theme="dark"] .view-btn {
      background: var(--bg);
      border-color: var(--border);
      color: var(--text);
    }

    [data-theme="dark"] .view-btn.active {
      background: var(--shell);
      color: var(--terminal);
      border-color: var(--shell);
    }

    [data-theme="dark"] .view-btn.save-btn {
      color: var(--text-secondary);
    }

    [data-theme="dark"] .popup {
      background: #161614;
      border: 1px solid var(--border);
    }

    [data-theme="dark"] .popup-overlay {
      background: rgba(0,0,0,0.6);
    }

    [data-theme="dark"] .popup-link {
      background: var(--shell);
      color: var(--terminal);
    }

    [data-theme="dark"] .popup-link:hover {
      background: var(--ultraviolet);
      color: white;
    }

    [data-theme="dark"] .status-dot.not-started { background: #4a4a42; }
    [data-theme="dark"] .status-dot.backlog { background: #5a5a50; }
    [data-theme="dark"] .status-dot.done { background: #22c55e; }

    [data-theme="dark"] .error {
      background: var(--project-bg);
      color: #ff6666;
    }

    /* Theme toggle button */
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .theme-toggle:hover {
      background: var(--hover);
    }

    .theme-toggle .theme-icon {
      font-size: 14px;
      line-height: 1;
    }

    /* ---- Asset sub-item cards in popup ---- */
    .subitems-section {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .subitems-section h4 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }
    .subitem-card {
      background: var(--border-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .subitem-card:last-child { margin-bottom: 0; }
    .subitem-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .subitem-name {
      font-size: 13px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .subitem-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 16px;
      font-size: 11px;
    }
    .subitem-detail {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .subitem-detail-label {
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .subitem-detail-value {
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .subitem-detail-value.muted {
      color: var(--text-secondary);
      font-weight: 400;
      font-style: italic;
    }
    .content-status-badge {
      display: inline-block;
      padding: 0px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
    }
    .subitem-due-overdue { color: #ff6666; }

    /* Responsive */
    @media (max-width: 900px) {
      .calendar-day { min-height: 80px; }
      .cal-item { font-size: 10px; padding: 1px 4px; }
      .header { flex-direction: column; align-items: flex-start; }
      .filters { margin-top: 8px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-left">
        <h1>Activities Calendar</h1>
        <div class="month-nav">
          <button onclick="prevMonth()">&larr;</button>
          <span class="month-label" id="monthLabel"></span>
          <button onclick="nextMonth()">&rarr;</button>
          <button class="today-btn" onclick="goToday()">Today</button>
        </div>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
        <span class="theme-icon" id="themeIcon">&#9788;</span>
        <span id="themeLabel">Light</span>
      </button>
    </div>

    <!-- Views bar -->
    <div class="views-bar" id="viewsBar">
      <label>Views:</label>
      <button class="view-btn active" onclick="loadView('all')">All Activities</button>
      <button class="view-btn" onclick="loadView('events-only')">Events Only</button>
      <button class="view-btn" onclick="loadView('assets-only')">Assets Only</button>
      <button class="view-btn" onclick="loadView('in-progress')">In Progress</button>
      <button class="view-btn save-btn" onclick="saveCurrentView()">+ Save Current View</button>
    </div>

    <!-- Filters — organized in rows -->
    <div class="filter-section" id="filters">
      <!-- Row 1: Category + Type + Status -->
      <div class="filter-row">
        <span class="filter-row-label">Category</span>
        <div class="filter-chip" data-category="Event" onclick="toggleCategory('Event')">
          <span class="dot"></span> Event
        </div>
        <div class="filter-chip" data-category="Campaign" onclick="toggleCategory('Campaign')">
          <span class="dot"></span> Campaign
        </div>
        <div class="filter-chip" data-category="Asset" onclick="toggleCategory('Asset')">
          <span class="dot"></span> Asset
        </div>
        <div class="filter-chip" data-category="Project" onclick="toggleCategory('Project')">
          <span class="dot"></span> Project
        </div>
        <div class="filter-chip" data-category="PR & Comms" onclick="toggleCategory('PR & Comms')">
          <span class="dot"></span> PR & Comms
        </div>

        <div class="filter-row-divider"></div>
        <span class="filter-row-label" style="min-width:auto;">Type</span>
        <div class="pill active" data-type="parent" onclick="toggleType('parent')">Parent</div>
        <div class="pill active" data-type="milestone" onclick="toggleType('milestone')">Milestone</div>
        <div class="pill active" data-type="action" onclick="toggleType('action')">Action Item</div>

        <div class="filter-row-divider"></div>
        <span class="filter-row-label" style="min-width:auto;">Status</span>
        <div class="pill status-active" data-status="all" onclick="setStatusFilter('all')">All</div>
        <div class="pill" data-status="active" onclick="setStatusFilter('active')">Active</div>
        <div class="pill" data-status="done" onclick="setStatusFilter('done')">Done</div>
      </div>

      <!-- Row 2: Owner + Initiative + Content filters -->
      <div class="filter-row">
        <span class="filter-row-label">Filters</span>
        <select class="filter-select" id="ownerFilter" onchange="renderCalendar()">
          <option value="">All Owners</option>
        </select>
        <select class="filter-select" id="initiativeFilter" onchange="renderCalendar()">
          <option value="">All Initiatives</option>
        </select>

        <div class="filter-row-divider"></div>
        <span class="filter-row-label" style="min-width:auto;">Content</span>
        <select class="filter-select" id="contentStatusFilter" onchange="renderCalendar()">
          <option value="">All Statuses</option>
        </select>
        <select class="filter-select" id="contentObjectiveFilter" onchange="renderCalendar()">
          <option value="">All Objectives</option>
        </select>
        <select class="filter-select" id="contentTrackFilter" onchange="renderCalendar()">
          <option value="">All Tracks</option>
        </select>
      </div>
    </div>

    <div class="stats-bar" id="statsBar"></div>

    <div id="calendarContainer">
      <div class="loading">
        <div class="spinner"></div>
        Loading activities...
      </div>
    </div>

    <!-- Detail popup -->
    <div class="popup-overlay" id="popupOverlay" onclick="closePopup(event)">
      <div class="popup" id="popup"></div>
    </div>
  </div>

  <script>
    // ---- State ----
    let currentDate = new Date();
    let activities = [];
    let contentOptions = null; // schema options from server
    let activeCategories = new Set(['Event', 'Campaign', 'Asset', 'Project', 'PR & Comms']);
    let activeTypes = new Set(['parent', 'milestone', 'action']);
    let statusFilter = 'all';
    let activeViewName = 'all';

    const MAX_ITEMS_PER_DAY = 4;

    // ---- Built-in view presets ----
    const builtInViews = {
      'all': {
        name: 'All Activities',
        categories: ['Event', 'Campaign', 'Asset', 'Project', 'PR & Comms'],
        types: ['parent', 'milestone', 'action'],
        status: 'all', owner: '', initiative: '',
        contentStatus: '', contentObjective: '', contentTrack: ''
      },
      'events-only': {
        name: 'Events Only',
        categories: ['Event'],
        types: ['parent', 'milestone', 'action'],
        status: 'all', owner: '', initiative: '',
        contentStatus: '', contentObjective: '', contentTrack: ''
      },
      'assets-only': {
        name: 'Assets Only',
        categories: ['Asset'],
        types: ['parent', 'milestone', 'action'],
        status: 'all', owner: '', initiative: '',
        contentStatus: '', contentObjective: '', contentTrack: ''
      },
      'in-progress': {
        name: 'In Progress',
        categories: ['Event', 'Campaign', 'Asset', 'Project', 'PR & Comms'],
        types: ['parent', 'milestone', 'action'],
        status: 'active', owner: '', initiative: '',
        contentStatus: '', contentObjective: '', contentTrack: ''
      }
    };

    // Custom saved views (loaded from URL hash)
    let customViews = {};

    // ---- View / preset management ----
    function getCurrentFilterState() {
      return {
        categories: [...activeCategories],
        types: [...activeTypes],
        status: statusFilter,
        owner: document.getElementById('ownerFilter')?.value || '',
        initiative: document.getElementById('initiativeFilter')?.value || '',
        contentStatus: document.getElementById('contentStatusFilter')?.value || '',
        contentObjective: document.getElementById('contentObjectiveFilter')?.value || '',
        contentTrack: document.getElementById('contentTrackFilter')?.value || ''
      };
    }

    function applyFilterState(state) {
      // Categories
      activeCategories = new Set(state.categories);
      document.querySelectorAll('.filter-chip').forEach(chip => {
        const cat = chip.dataset.category;
        chip.classList.toggle('inactive', !activeCategories.has(cat));
      });

      // Types
      activeTypes = new Set(state.types);
      document.querySelectorAll('.pill[data-type]').forEach(pill => {
        pill.classList.toggle('active', activeTypes.has(pill.dataset.type));
      });

      // Status
      statusFilter = state.status;
      document.querySelectorAll('.pill[data-status]').forEach(p => p.classList.remove('status-active'));
      document.querySelector(`.pill[data-status="${statusFilter}"]`)?.classList.add('status-active');

      // Owner & Initiative
      if (document.getElementById('ownerFilter'))
        document.getElementById('ownerFilter').value = state.owner || '';
      if (document.getElementById('initiativeFilter'))
        document.getElementById('initiativeFilter').value = state.initiative || '';

      // Content filters
      if (document.getElementById('contentStatusFilter'))
        document.getElementById('contentStatusFilter').value = state.contentStatus || '';
      if (document.getElementById('contentObjectiveFilter'))
        document.getElementById('contentObjectiveFilter').value = state.contentObjective || '';
      if (document.getElementById('contentTrackFilter'))
        document.getElementById('contentTrackFilter').value = state.contentTrack || '';

      renderCalendar();
    }

    function loadView(viewName) {
      const view = builtInViews[viewName] || customViews[viewName];
      if (!view) return;

      activeViewName = viewName;
      applyFilterState(view);
      updateViewButtons();
    }

    function updateViewButtons() {
      document.querySelectorAll('.view-btn:not(.save-btn)').forEach(btn => {
        btn.classList.remove('active');
      });
      const activeBtn = document.querySelector(`.view-btn[onclick="loadView('${activeViewName}')"]`);
      if (activeBtn) activeBtn.classList.add('active');
    }

    function saveCurrentView() {
      const name = prompt('Name this view:');
      if (!name || !name.trim()) return;

      const key = 'custom-' + name.trim().toLowerCase().replace(/\s+/g, '-');
      const state = getCurrentFilterState();
      state.name = name.trim();
      customViews[key] = state;
      activeViewName = key;

      saveCustomViewsToHash();
      renderViewsBar();
    }

    function deleteCustomView(key, event) {
      event.stopPropagation();
      delete customViews[key];
      if (activeViewName === key) {
        activeViewName = 'all';
        loadView('all');
      }
      saveCustomViewsToHash();
      renderViewsBar();
    }

    function saveCustomViewsToHash() {
      if (Object.keys(customViews).length > 0) {
        const encoded = btoa(JSON.stringify(customViews));
        window.location.hash = 'views=' + encoded;
      } else {
        window.location.hash = '';
      }
    }

    function loadCustomViewsFromHash() {
      const hash = window.location.hash.slice(1);
      if (hash.startsWith('views=')) {
        try {
          customViews = JSON.parse(atob(hash.slice(6)));
        } catch (e) {
          customViews = {};
        }
      }
    }

    function renderViewsBar() {
      const bar = document.getElementById('viewsBar');
      let html = '<label>Views:</label>';

      // Built-in views
      for (const [key, view] of Object.entries(builtInViews)) {
        const active = activeViewName === key ? 'active' : '';
        html += `<button class="view-btn ${active}" onclick="loadView('${key}')">${view.name}</button>`;
      }

      // Custom views
      for (const [key, view] of Object.entries(customViews)) {
        const active = activeViewName === key ? 'active' : '';
        html += `<button class="view-btn ${active}" onclick="loadView('${key}')">${view.name}
                   <span class="view-btn delete-btn" onclick="deleteCustomView('${key}', event)">&times;</span>
                 </button>`;
      }

      html += '<button class="view-btn save-btn" onclick="saveCurrentView()">+ Save Current View</button>';
      bar.innerHTML = html;
    }

    // ---- Data fetching ----
    async function fetchActivities(retries = 3) {
      for (let attempt = 1; attempt <= retries; attempt++) {
        try {
          document.getElementById('calendarContainer').innerHTML =
            `<div class="loading"><div class="spinner"></div>Loading activities...${attempt > 1 ? ` (attempt ${attempt}/${retries})` : ''}</div>`;

          const res = await fetch('/api/activities', { signal: AbortSignal.timeout(120000) });
          const json = await res.json();
          if (json.success) {
            activities = json.data;
            contentOptions = json.contentOptions || null;
            populateContentFilters();
            updateStats();
            loadCustomViewsFromHash();
            renderViewsBar();
            renderCalendar();
            return;
          } else {
            if (attempt === retries) showError(json.error);
          }
        } catch (err) {
          if (attempt === retries) {
            showError('Could not connect to server. It may be waking up — try refreshing in 30 seconds.');
          }
          await new Promise(r => setTimeout(r, 5000));
        }
      }
    }

    // Populate Content info filter dropdowns from schema options (all possible values)
    function populateContentFilters() {
      const fillSelect = (id, schemaKey, directValues) => {
        const sel = document.getElementById(id);
        if (!sel) return;
        const current = sel.value;
        const firstOption = sel.options[0].outerHTML; // "All ..." option

        let values;
        if (directValues) {
          values = directValues;
        } else if (contentOptions && contentOptions[schemaKey]) {
          values = contentOptions[schemaKey];
        } else {
          const valSet = new Set();
          activities.forEach(a => { if (a[schemaKey]) valSet.add(a[schemaKey]); });
          values = [...valSet].sort();
        }

        sel.innerHTML = firstOption;
        values.forEach(v => {
          const opt = document.createElement('option');
          opt.value = v;
          opt.textContent = v;
          sel.appendChild(opt);
        });
        sel.value = current;
      };

      fillSelect('contentStatusFilter', 'contentStatus');
      fillSelect('contentObjectiveFilter', 'contentObjective');
      fillSelect('contentTrackFilter', 'contentTrack');

      // Populate Owner and Initiative from activity data
      const owners = new Set();
      const initiatives = new Set();
      activities.forEach(a => {
        if (a.owner) a.owner.forEach(o => owners.add(o));
        if (a.strategicInitiative) initiatives.add(a.strategicInitiative);
      });
      fillSelect('ownerFilter', 'owner', [...owners].sort());
      fillSelect('initiativeFilter', 'initiative', [...initiatives].sort());
    }

    function showError(msg) {
      document.getElementById('calendarContainer').innerHTML =
        `<div class="error"><strong>Error:</strong> ${msg}</div>`;
    }

    // ---- Stats ----
    function updateStats() {
      const withDates = activities.filter(a => a.startDate || a.endDate);
      const parents = activities.filter(a => a.isParent);
      const subs = activities.filter(a => !a.isParent);
      const bar = document.getElementById('statsBar');
      bar.innerHTML = `
        <div class="stat"><strong>${activities.length}</strong> total items</div>
        <div class="stat"><strong>${withDates.length}</strong> with dates</div>
        <div class="stat"><strong>${parents.length}</strong> parents</div>
        <div class="stat"><strong>${subs.length}</strong> sub-items</div>
      `;
    }

    // ---- Filters ----
    function toggleCategory(cat) {
      const chip = document.querySelector(`.filter-chip[data-category="${cat}"]`);
      if (activeCategories.has(cat)) {
        activeCategories.delete(cat);
        chip.classList.add('inactive');
      } else {
        activeCategories.add(cat);
        chip.classList.remove('inactive');
      }
      renderCalendar();
    }

    function toggleType(type) {
      const pill = document.querySelector(`.pill[data-type="${type}"]`);
      if (activeTypes.has(type)) {
        activeTypes.delete(type);
        pill.classList.remove('active');
      } else {
        activeTypes.add(type);
        pill.classList.add('active');
      }
      renderCalendar();
    }

    function setStatusFilter(filter) {
      statusFilter = filter;
      document.querySelectorAll('.pill[data-status]').forEach(p => p.classList.remove('status-active'));
      document.querySelector(`.pill[data-status="${filter}"]`)?.classList.add('status-active');
      renderCalendar();
    }

    function passesFilters(item) {
      // Category filter
      if (!activeCategories.has(item.category)) return false;

      // Type filter
      if (item.isParent && !activeTypes.has('parent')) return false;
      if (item.isMilestone && !activeTypes.has('milestone')) return false;
      if (item.isActionItem && !activeTypes.has('action')) return false;

      // Status filter
      if (statusFilter === 'active' && item.status === 'Done') return false;
      if (statusFilter === 'done' && item.status !== 'Done') return false;

      // Owner filter
      const ownerFilter = document.getElementById('ownerFilter')?.value;
      if (ownerFilter && (!item.owner || !item.owner.includes(ownerFilter))) return false;

      // Initiative filter
      const initFilter = document.getElementById('initiativeFilter')?.value;
      if (initFilter && item.strategicInitiative !== initFilter) return false;

      // Content info filters (only apply to Asset items)
      const csFilter = document.getElementById('contentStatusFilter')?.value;
      const coFilter = document.getElementById('contentObjectiveFilter')?.value;
      const ctFilter = document.getElementById('contentTrackFilter')?.value;

      if (csFilter || coFilter || ctFilter) {
        if (item.category === 'Asset') {
          if (csFilter && item.contentStatus !== csFilter) return false;
          if (coFilter && item.contentObjective !== coFilter) return false;
          if (ctFilter && item.contentTrack !== ctFilter) return false;
        }
      }

      return true;
    }

    // ---- Navigation ----
    function prevMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    }

    function goToday() {
      currentDate = new Date();
      renderCalendar();
    }

    // ---- Calendar rendering ----
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      document.getElementById('monthLabel').textContent =
        new Date(year, month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startOffset = firstDay.getDay(); // 0=Sun
      const totalDays = lastDay.getDate();

      // Build day cells
      const days = [];

      // Previous month fill
      const prevMonthLast = new Date(year, month, 0).getDate();
      for (let i = startOffset - 1; i >= 0; i--) {
        days.push({ date: new Date(year, month - 1, prevMonthLast - i), otherMonth: true });
      }

      // Current month
      for (let d = 1; d <= totalDays; d++) {
        days.push({ date: new Date(year, month, d), otherMonth: false });
      }

      // Next month fill (complete last week)
      const remaining = 7 - (days.length % 7);
      if (remaining < 7) {
        for (let d = 1; d <= remaining; d++) {
          days.push({ date: new Date(year, month + 1, d), otherMonth: true });
        }
      }

      // Get items for each day
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let html = `
        <div class="calendar">
          <div class="weekday-header">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
          </div>
          <div class="calendar-grid">
      `;

      // Process weeks for slot-based rendering
      // This ensures multi-day spanning items stay on the same row across all days
      for (let weekStart = 0; weekStart < days.length; weekStart += 7) {
        const weekDays = days.slice(weekStart, weekStart + 7);
        const weekDateStrs = weekDays.map(d => formatDate(d.date));

        // Build items list for each day in this week
        const weekDayItems = weekDateStrs.map(ds => getItemsForDate(ds));

        // Identify spanning items that cross multiple days in this week
        // and assign them fixed slot positions
        const slotAssignments = {}; // itemId -> slot number
        const daySlots = weekDateStrs.map(() => []); // for each day, array of {slot, item} or null

        // First pass: find spanning items and assign slots
        const spanningItems = [];
        activities.forEach(item => {
          if (item.type !== 'Parent - Event') return;
          if (!passesFilters(item)) return;
          const start = item.startDate?.start;
          const end = item.endDate?.start;
          if (!start || !end || start === end) return;

          // Check if this item overlaps with this week
          const weekFirst = weekDateStrs[0];
          const weekLast = weekDateStrs[6];
          if (end < weekFirst || start > weekLast) return;

          // Find which days in this week the item spans
          const dayIndices = [];
          weekDateStrs.forEach((ds, i) => {
            if (ds >= start && ds <= end) dayIndices.push(i);
          });
          if (dayIndices.length <= 1) return;

          spanningItems.push({ item, dayIndices });
        });

        // Sort spanning items by start date, then by length (longer first)
        spanningItems.sort((a, b) => {
          const aStart = a.item.startDate?.start || '';
          const bStart = b.item.startDate?.start || '';
          if (aStart !== bStart) return aStart.localeCompare(bStart);
          return b.dayIndices.length - a.dayIndices.length;
        });

        // Assign slots to spanning items
        spanningItems.forEach(({ item, dayIndices }) => {
          // Find the lowest slot that is free across all days this item spans
          let slot = 0;
          while (true) {
            const conflict = dayIndices.some(di => daySlots[di][slot] != null);
            if (!conflict) break;
            slot++;
          }
          slotAssignments[item.id] = slot;
          dayIndices.forEach(di => {
            daySlots[di][slot] = item;
          });
        });

        // Second pass: for each day, fill remaining slots with non-spanning items
        weekDayItems.forEach((items, dayIdx) => {
          const nonSpanning = items.filter(it => !(it.id in slotAssignments));
          let slot = 0;
          nonSpanning.forEach(item => {
            // Find next free slot
            while (daySlots[dayIdx][slot] != null) slot++;
            daySlots[dayIdx][slot] = item;
            slot++;
          });
        });

        // Now render each day in this week using the slot layout
        weekDays.forEach((day, dayIdx) => {
          const dateStr = weekDateStrs[dayIdx];
          const isToday = day.date.getTime() === today.getTime();
          const classes = ['calendar-day'];
          if (day.otherMonth) classes.push('other-month');
          if (isToday) classes.push('today');

          html += `<div class="${classes.join(' ')}">`;
          html += `<div class="day-number">${day.date.getDate()}</div>`;

          const slots = daySlots[dayIdx];
          // Find max slot index used
          const maxSlot = slots.length - 1;
          let rendered = 0;

          for (let s = 0; s <= Math.min(maxSlot, MAX_ITEMS_PER_DAY - 1); s++) {
            const item = slots[s];
            if (!item) {
              // Empty slot — render a spacer to keep alignment
              html += `<div class="cal-item" style="visibility:hidden;height:18px;margin-bottom:2px;">&nbsp;</div>`;
              rendered++;
              continue;
            }

            const typeClass = item.isParent ? 'parent' : item.isMilestone ? 'milestone' : 'action-item';
            const statusClass = getStatusClass(item.status);
            const prefix = item.isParent ? '' : item.isMilestone ? '\u25C7 ' : '\u2022 ';

            // Determine span class for multi-day Parent-Event items
            let spanClass = '';
            if (item.id in slotAssignments) {
              const start = item.startDate?.start;
              const end = item.endDate?.start;
              if (dateStr === start) spanClass = 'span-start';
              else if (dateStr === end) spanClass = 'span-end';
              else spanClass = 'span-middle';
            }

            html += `<div class="cal-item ${typeClass} ${spanClass}" data-category="${item.category}"
                          onclick="showDetail('${item.id}')" title="${item.name}">
                      <span class="status-dot ${statusClass}"></span>${prefix}${item.name}
                     </div>`;
            rendered++;
          }

          // Count items beyond visible slots
          const totalItems = slots.filter(s => s != null).length;
          const hiddenCount = totalItems - rendered;
          if (hiddenCount > 0) {
            html += `<div class="more-items" onclick="showDayDetail('${dateStr}')">+${hiddenCount} more</div>`;
          }

          html += `</div>`;
        });
      }

      html += '</div></div>';

      document.getElementById('calendarContainer').innerHTML = html;
    }

    function getItemsForDate(dateStr) {
      return activities.filter(item => {
        if (!passesFilters(item)) return false;

        const start = item.startDate?.start;
        const end = item.endDate?.start;

        if (!start && !end) return false;

        // Only "Parent - Event" items span across their full date range
        const isParentEvent = item.type === 'Parent - Event';

        if (isParentEvent) {
          if (start && !end) return start === dateStr;
          if (!start && end) return end === dateStr;
          return dateStr >= start && dateStr <= end;
        } else {
          // Everything else: show only on the end date (due date)
          // Fall back to start date if no end date exists
          const showDate = end || start;
          return showDate === dateStr;
        }
      });
    }

    // ---- Detail popup ----
    function showDetail(itemId) {
      const item = activities.find(a => a.id === itemId);
      if (!item) return;

      const categoryBadgeStyle = getCategoryBadgeStyle(item.category);
      const statusClass = getStatusClass(item.status);

      // Find parent name if exists
      let parentName = '';
      if (item.parentItem.length > 0) {
        const parent = activities.find(a => a.id === item.parentItem[0]);
        parentName = parent ? parent.name : '';
      }

      // Find sub-items
      const subItems = item.subItems
        .map(id => activities.find(a => a.id === id))
        .filter(Boolean);

      const popup = document.getElementById('popup');
      popup.innerHTML = `
        <button class="popup-close" onclick="closePopup(event)">&times;</button>
        <h3>${item.name}</h3>
        <div class="popup-meta">
          <div class="popup-meta-row">
            <span class="popup-meta-label">Type</span>
            <span class="popup-badge" style="${categoryBadgeStyle}">${item.type}</span>
          </div>
          <div class="popup-meta-row">
            <span class="popup-meta-label">Status</span>
            <span class="popup-meta-value"><span class="status-dot ${statusClass}"></span> ${item.status || 'N/A'}</span>
          </div>
          ${item.startDate ? `
          <div class="popup-meta-row">
            <span class="popup-meta-label">Start</span>
            <span class="popup-meta-value">${formatDisplayDate(item.startDate.start)}</span>
          </div>` : ''}
          ${item.endDate ? `
          <div class="popup-meta-row">
            <span class="popup-meta-label">End / Due</span>
            <span class="popup-meta-value">${formatDisplayDate(item.endDate.start)}</span>
          </div>` : ''}
          ${item.owner.length > 0 ? `
          <div class="popup-meta-row">
            <span class="popup-meta-label">Owner</span>
            <span class="popup-meta-value">${item.owner.join(', ')}</span>
          </div>` : ''}
          ${item.strategicInitiative ? `
          <div class="popup-meta-row">
            <span class="popup-meta-label">Initiative</span>
            <span class="popup-meta-value">${item.strategicInitiative}</span>
          </div>` : ''}
          ${parentName ? `
          <div class="popup-meta-row">
            <span class="popup-meta-label">Parent</span>
            <span class="popup-meta-value">${parentName}</span>
          </div>` : ''}
        </div>
          ${(item.contentStatus || item.contentObjective || item.contentTrack) ? `
          <div style="margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border);">
            <h4 style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 8px;">Content Information</h4>
            <div class="popup-meta" style="margin-bottom: 0;">
              ${item.contentStatus ? `
              <div class="popup-meta-row">
                <span class="popup-meta-label">Status</span>
                <span class="popup-meta-value">${item.contentStatus}</span>
              </div>` : ''}
              ${item.contentObjective ? `
              <div class="popup-meta-row">
                <span class="popup-meta-label">Objective</span>
                <span class="popup-meta-value">${item.contentObjective}</span>
              </div>` : ''}
              ${item.contentTrack ? `
              <div class="popup-meta-row">
                <span class="popup-meta-label">Track</span>
                <span class="popup-meta-value">${item.contentTrack}</span>
              </div>` : ''}
            </div>
          </div>` : ''}
          ${(item.category === 'Asset' && subItems.length > 0) ? `
          <div class="subitems-section">
            <h4>Sub-Items (${subItems.length})</h4>
            ${subItems.map(sub => {
              const subStatusClass = getStatusClass(sub.status);
              const subDue = sub.endDate ? formatDisplayDate(sub.endDate.start).replace(/,\s*\d{4}$/, '') : null;
              const subOwner = sub.owner && sub.owner.length > 0 ? sub.owner.join(', ') : null;
              const subContentStatus = sub.contentStatus || null;
              const isOverdue = sub.endDate && sub.status !== 'Done' && sub.endDate.start < new Date().toISOString().split('T')[0];
              return `
              <div class="subitem-card">
                <div class="subitem-header">
                  <span class="status-dot ${subStatusClass}"></span>
                  <span class="subitem-name">${sub.name}</span>
                </div>
                <div class="subitem-details">
                  <div class="subitem-detail">
                    <span class="subitem-detail-label">Owner:</span>
                    <span class="subitem-detail-value${subOwner ? '' : ' muted'}">${subOwner || '—'}</span>
                  </div>
                  <div class="subitem-detail">
                    <span class="subitem-detail-label">Due:</span>
                    <span class="subitem-detail-value${subDue ? (isOverdue ? ' subitem-due-overdue' : '') : ' muted'}">${subDue || '—'}</span>
                  </div>
                  <div class="subitem-detail">
                    <span class="subitem-detail-label">Content Status:</span>
                    <span class="subitem-detail-value${subContentStatus ? '' : ' muted'}">${subContentStatus || '—'}</span>
                  </div>
                </div>
              </div>`;
            }).join('')}
          </div>` : `${subItems.length > 0 ? `
          <div class="popup-meta-row" style="margin-top: 4px;">
            <span class="popup-meta-label">Sub-items</span>
            <span class="popup-meta-value">${subItems.map(s => s.name).join(', ')}</span>
          </div>` : ''}`}
        <a class="popup-link" href="${item.notionUrl}" target="_blank" rel="noopener">Open in Notion &rarr;</a>
      `;

      document.getElementById('popupOverlay').classList.add('active');
    }

    function showDayDetail(dateStr) {
      const dayItems = getItemsForDate(dateStr);
      const popup = document.getElementById('popup');

      popup.innerHTML = `
        <button class="popup-close" onclick="closePopup(event)">&times;</button>
        <h3>${formatDisplayDate(dateStr)}</h3>
        <div style="margin-top: 12px;">
          ${dayItems.map(item => {
            const categoryBadgeStyle = getCategoryBadgeStyle(item.category);
            const statusClass = getStatusClass(item.status);
            const prefix = item.isParent ? '' : item.isMilestone ? '\u25C7 ' : '\u2022 ';
            return `
              <div style="padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer;"
                   onclick="showDetail('${item.id}')">
                <span class="status-dot ${statusClass}"></span>
                <strong>${prefix}${item.name}</strong>
                <span class="popup-badge" style="${categoryBadgeStyle}; margin-left: 6px; font-size: 10px;">${item.type}</span>
              </div>`;
          }).join('')}
        </div>
      `;

      document.getElementById('popupOverlay').classList.add('active');
    }

    function closePopup(e) {
      if (e.target === document.getElementById('popupOverlay') || e.target.classList.contains('popup-close')) {
        document.getElementById('popupOverlay').classList.remove('active');
      }
    }

    // ---- Helpers ----
    function formatDate(date) {
      return date.toISOString().split('T')[0];
    }

    function formatDisplayDate(dateStr) {
      if (!dateStr) return 'N/A';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    }

    function getStatusClass(status) {
      switch (status) {
        case 'Done': return 'done';
        case 'In progress': return 'in-progress';
        case 'Not started': return 'not-started';
        case 'Backlog': return 'backlog';
        default: return 'not-started';
      }
    }

    function getCategoryBadgeStyle(category) {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const styles = isDark ? {
        'Event': 'background: var(--event-bg); color: #f0a030; border: 1px solid var(--event-border)',
        'Campaign': 'background: var(--campaign-bg); color: #a78bfa; border: 1px solid var(--campaign-border)',
        'Asset': 'background: var(--asset-bg); color: #20d4cc; border: 1px solid var(--asset-border)',
        'Project': 'background: var(--project-bg); color: #ff6666; border: 1px solid var(--project-border)',
        'PR & Comms': 'background: var(--pr-comms-bg); color: #e850e0; border: 1px solid var(--pr-comms-border)',
      } : {
        'Event': 'background: var(--event-bg); color: #8a5000; border: 1px solid var(--event-border)',
        'Campaign': 'background: var(--campaign-bg); color: #4a22c4; border: 1px solid var(--campaign-border)',
        'Asset': 'background: var(--asset-bg); color: #007a77; border: 1px solid var(--asset-border)',
        'Project': 'background: var(--project-bg); color: #b80000; border: 1px solid var(--project-border)',
        'PR & Comms': 'background: var(--pr-comms-bg); color: #9a0093; border: 1px solid var(--pr-comms-border)',
      };
      return styles[category] || (isDark ? 'background: #1c1c1a; color: #a8a793' : 'background: #f3f4f6; color: #374151');
    }

    // Keyboard nav
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.getElementById('popupOverlay').classList.remove('active');
      }
      if (e.key === 'ArrowLeft') prevMonth();
      if (e.key === 'ArrowRight') nextMonth();
    });

    // ---- Theme toggle ----
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeButton(next);
      // Re-render to update badge styles in popups
      if (activities.length > 0) renderCalendar();
    }

    function updateThemeButton(theme) {
      const icon = document.getElementById('themeIcon');
      const label = document.getElementById('themeLabel');
      if (theme === 'dark') {
        icon.innerHTML = '&#9788;'; // sun
        label.textContent = 'Light';
      } else {
        icon.innerHTML = '&#9790;'; // moon
        label.textContent = 'Dark';
      }
    }

    // Apply saved theme preference (default: dark)
    (function initTheme() {
      const saved = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      updateThemeButton(saved);
    })();

    // ---- Init ----
    fetchActivities();
  </script>
</body>
</html>
