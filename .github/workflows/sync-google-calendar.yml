name: Sync Notion activities to Google Calendar

on:
  schedule:
    # Every 15 minutes. GitHub Actions cron has variable lag — typically
    # within 5 minutes of scheduled time, occasionally more under high load.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install googleapis
        run: npm install googleapis@^144 --no-save

      - name: Run sync
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
        run: node scripts/sync-google-calendar.js
