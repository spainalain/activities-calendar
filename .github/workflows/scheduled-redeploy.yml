name: Scheduled Render redeploy

on:
  schedule:
    - cron: '0 13,18,0 * * *'
  workflow_dispatch: {}

jobs:
  redeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering Render deploy hook..."
          HTTP_CODE=$(curl -sS -o /tmp/hook_resp.json -w "%{http_code}" -X POST "$HOOK")
          echo "HTTP status: $HTTP_CODE"
          cat /tmp/hook_resp.json
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Deploy hook returned $HTTP_CODE"
            exit 1
          fi
          echo "Deploy triggered successfully — not waiting for completion."
