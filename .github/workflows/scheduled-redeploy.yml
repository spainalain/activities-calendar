name: Scheduled Render redeploy

on:
  schedule:
    - cron: '0 13,18,0 * * *'
  workflow_dispatch: {}

jobs:
  redeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering Render deploy hook..."
          HTTP_CODE=$(curl -sS -o /tmp/hook_resp.json -w "%{http_code}" -X POST "$HOOK")
          echo "HTTP status: $HTTP_CODE"
          cat /tmp/hook_resp.json
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Deploy hook returned $HTTP_CODE"
            exit 1
          fi

      - name: Wait for deploy and verify /api/health
        run: |
          echo "Polling /api/health until cache is fresh (max 100s)..."
          for i in {1..20}; do
            sleep 5
            RESPONSE=$(curl -sS https://activities-calendar.onrender.com/api/health 2>/dev/null || echo '{}')
            AGE=$(echo "$RESPONSE" | grep -oE '"cacheAge":"[0-9]+' | grep -oE '[0-9]+' || echo "-1")
            echo "Attempt $i (t=$((i*5))s): $RESPONSE"
            if [ "$AGE" != "-1" ] && [ "$AGE" -lt 120 ]; then
              echo "Cache refreshed successfully after $((i * 5)) seconds"
              exit 0
            fi
          done
          echo "::warning::Cache did not go fresh within 100 seconds"
